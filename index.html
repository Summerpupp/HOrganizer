<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ho位整理表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: #fffdf9;
      --surface2: #faf6f1;
      --border: #e8dfd4;
      --border-soft: #f0e8e0;
      --text-primary: #3a2e26;
      --text-secondary: #8a7a6e;
      --text-muted: #b8a89a;
      --accent: #c2846a;
      --accent-soft: #f0e0d8;

      --ho1: #d4a5b0;
      --ho1-bg: #fdf0f3;
      --ho1-border: #f0d0d8;

      --ho2: #a5b8d4;
      --ho2-bg: #f0f4fd;
      --ho2-border: #d0daf0;

      --ho3: #a5c4a5;
      --ho3-bg: #f0faf0;
      --ho3-border: #d0ead0;

      --ho4: #c4b4a5;
      --ho4-bg: #faf4f0;
      --ho4-border: #e8ddd4;

      --ho5: #b0aec8;
      --ho5-bg: #f4f3fa;
      --ho5-border: #dddaf0;

      --status-satellite: #7db5d4;
      --status-satellite-bg: #e8f4fc;
      --status-ongoing: #7db87d;
      --status-ongoing-bg: #e8f5e8;
      --status-done: #c4a040;
      --status-done-bg: #fdf5e0;
      --status-disbanded: #a09090;
      --status-disbanded-bg: #f0eded;

      --status-paused: #c49a40;
      --status-paused-bg: #fdf7e0;

      --shadow: 0 2px 12px rgba(58,46,38,0.06);
      --shadow-hover: 0 4px 20px rgba(58,46,38,0.1);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif SC', 'Lato', serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--text-primary);
      position: relative;
      display: inline-block;
    }
    .header-title::after {
      content: '';
      display: block;
      margin: 6px auto 0;
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      letter-spacing: .04em;
      font-weight: 300;
      font-family: 'Lato', sans-serif;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Column card ── */
    .col-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .col-card:hover { box-shadow: var(--shadow-hover); }

    .col-header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-soft);
    }
    .col-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .col-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-card.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: 2px;
    }
    .col-card.dragging {
      opacity: 0.45;
      cursor: grabbing;
    }
    /* drag handle on col-header */
    .col-header { cursor: grab; }
    .col-header:active { cursor: grabbing; }

    .entries-list {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Entry ── */
    .entry {
      background: var(--surface2);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      padding: 9px 8px 9px 10px;
      position: relative;
      display: flex;
      flex-direction: row;
      gap: 4px;
      align-items: stretch;
      transition: border-color .15s, box-shadow .15s;
    }
    .entry:hover { border-color: var(--border); }
    .entry:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(194,132,106,0.1);
    }
    .entry-main { flex: 1; min-width: 0; }

    .entry-top {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .status-badge {
      flex-shrink: 0;
      font-size: 10px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
      letter-spacing: .02em;
    }
    .status-badge:hover { opacity: .8; transform: scale(1.04); }
    .status-badge:active { transform: scale(.96); }

    .status-0 { background: var(--status-satellite-bg); color: var(--status-satellite); }
    .status-1 { background: var(--status-ongoing-bg); color: var(--status-ongoing); }
    .status-2 { background: var(--status-done-bg); color: var(--status-done); }
    .status-3 { background: var(--status-disbanded-bg); color: var(--status-disbanded); }
    .status-4 { background: var(--status-paused-bg); color: var(--status-paused); }

    .field-module {
      flex: 1;
      min-width: 0;
    }

    input.text-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Noto Serif SC', serif;
      color: var(--text-primary);
      font-size: 13px;
    }
    input.text-input::placeholder { color: var(--text-muted); }

    .field-char {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-left: 2px;
    }
    .char-label {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      font-family: 'Lato', sans-serif;
    }
    input.char-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Noto Serif SC', serif;
      color: var(--text-secondary);
      font-size: 12px;
    }
    input.char-input::placeholder { color: var(--text-muted); }

    /* ── Entry controls (move up/down + delete) ── */
    .entry-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 2px;
      opacity: 0.25;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .entry:hover .entry-controls,
    .entry:focus-within .entry-controls { opacity: 1; }
    @media (hover: none) {
      .entry-controls { opacity: 0.5; }
    }
    .btn-ctrl {
      width: 18px; height: 18px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      transition: background .15s, color .15s;
      padding: 0;
      flex-shrink: 0;
    }
    .btn-ctrl:hover { background: var(--border); color: var(--text-secondary); }
    .btn-ctrl-del:hover { background: #f5e0dc; color: #c05050; }
    .btn-ctrl:disabled { opacity: 0.2; cursor: default; }
    .btn-ctrl:disabled:hover { background: none; color: var(--text-muted); }

    /* ── Custom column: editable title + delete col button ── */
    .col-title-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .06em;
      color: inherit;
      width: 100%;
      min-width: 0;
      cursor: text;
    }
    .col-title-input::placeholder { color: rgba(0,0,0,0.25); font-weight: 400; }
    .btn-del-col {
      flex-shrink: 0;
      width: 20px; height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(0,0,0,0.25);
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      transition: background .15s, color .15s;
      margin-left: 4px;
    }
    .btn-del-col:hover { background: rgba(200,80,80,0.12); color: #c05050; }

    /* ── Add column button ── */
    .btn-add-col {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .2s;
      background: var(--surface);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .btn-add-col:hover { border-color: var(--accent); color: var(--accent); }
      margin: 4px 10px 10px;
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      padding: 7px;
      cursor: pointer;
      width: calc(100% - 20px);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      transition: border-color .15s, color .15s, background .15s;
      letter-spacing: .02em;
    }
    .btn-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── Browser tip banner ── */
    .tip-banner {
      max-width: 1200px;
      margin: 0 auto 20px;
      background: #fffbf0;
      border: 1px solid #f0dfc0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      color: #8a6a30;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: .02em;
    }
    .tip-banner .tip-icon { font-size: 15px; flex-shrink: 0; }
    .tip-banner .tip-close {
      margin-left: auto;
      cursor: pointer;
      opacity: .5;
      font-size: 14px;
      flex-shrink: 0;
      background: none;
      border: none;
      color: inherit;
      padding: 0 2px;
    }
    .tip-banner .tip-close:hover { opacity: 1; }

    /* ── Export mode selector ── */
    .export-mode {
      max-width: 1200px;
      margin: 16px auto 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mode-label {
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      color: var(--text-muted);
      letter-spacing: .03em;
      white-space: nowrap;
    }
    .mode-options {
      display: flex;
      gap: 6px;
    }
    .mode-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: all .15s;
      white-space: nowrap;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      line-height: 1.3;
    }
    .mode-btn .mode-tag {
      font-size: 9px;
      font-weight: 400;
      opacity: .7;
      letter-spacing: .02em;
    }
    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .mode-btn.active .mode-tag { opacity: .85; }
    .mode-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }
      max-width: 960px;
      margin: 20px auto 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-action {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .2s;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(194,132,106,0.3);
    }
    .btn-primary:hover {
      background: #b07258;
      box-shadow: 0 4px 16px rgba(194,132,106,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Export snapshot (hidden, used for capture) ── */
    #snapshot {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 750px;
      background: var(--bg);
      padding: 36px 28px 40px;
      font-family: 'Noto Serif SC', serif;
      color: var(--text-primary);
    }
    #snapshot .snap-title {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: .1em;
      margin-bottom: 6px;
    }
    #snapshot .snap-title::after {
      content: '';
      display: block;
      margin: 8px auto 0;
      width: 48px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }
    #snapshot .snap-sub {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'Lato', sans-serif;
      margin-top: 10px;
      margin-bottom: 24px;
    }
    #snapshot .snap-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    #snapshot .snap-col {
      border-radius: 12px;
      overflow: hidden;
      border: 1.5px solid;
    }
    #snapshot .snap-col-h {
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      display: flex; align-items: center; gap: 8px;
    }
    #snapshot .snap-col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    #snapshot .snap-entry {
      background: var(--surface2);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      padding: 9px 11px;
    }
    #snapshot .snap-mod-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    #snapshot .snap-mod-name { font-size: 13px; font-weight: 500; }
    #snapshot .snap-char { font-size: 12px; color: var(--text-secondary); }
    #snapshot .snap-empty { font-size: 12px; color: var(--text-muted); font-style: italic; text-align: center; padding: 8px 0; }
    #snapshot .snap-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    #snapshot .snap-footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-muted); font-family: 'Lato', sans-serif; }

    /* ── Image preview modal ── */
    #img-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(30,22,18,0.82);
      backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center; justify-content: center;
      flex-direction: column;
      padding: 24px 16px;
    }
    #img-modal.show { display: flex; }
    .modal-hint {
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      letter-spacing: .04em;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .modal-hint span { font-size: 18px; }
    #modal-img {
      max-width: 100%;
      max-height: 65vh;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: block;
      -webkit-touch-callout: default; /* allow long-press save on iOS */
    }
    .modal-actions {
      display: flex; gap: 10px; margin-top: 16px;
    }
    .btn-modal {
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      border: none;
      letter-spacing: .04em;
    }
    .btn-modal-share {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(194,132,106,0.4);
    }
    .btn-modal-close {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.25);
    }

    /* Loading overlay */
    #loading {
      display: none;
      position: fixed; inset: 0;
      background: rgba(245,240,235,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text-secondary); font-family: 'Lato', sans-serif; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">Ho 位整理表</div>
  <div class="header-sub">拖动栏目标题可排序 · 点击状态标签切换 · 悬停条目可移动或删除</div>
</div>

<div class="tip-banner" id="tipBanner">
  <span class="tip-icon">💡</span>
  建议使用手机<strong>默认浏览器</strong>打开本工具，出现 bug 的概率最小。在微信、QQ 等 App 内置浏览器中使用可能出现保存图片失败等问题。
  <button class="tip-close" onclick="document.getElementById('tipBanner').style.display='none'">✕</button>
</div>

<div class="grid" id="mainGrid">
  <!-- Columns injected by JS -->
</div>

<div class="export-mode">
  <span class="mode-label">图片样式：</span>
  <div class="mode-options">
    <button class="mode-btn active" id="modeWide" onclick="setMode('wide')">
      横向宽图
      <span class="mode-tag">通用 / 电脑端</span>
    </button>
    <button class="mode-btn" id="modeLong" onclick="setMode('long')">
      竖向长图
      <span class="mode-tag">推荐 QQ 空间</span>
    </button>
  </div>
</div>

<div class="actions">
  <button class="btn-add-col" onclick="addCustomColumn()">＋ 新建栏目</button>
  <button class="btn-action btn-primary" onclick="exportImage()">📷 保存为图片</button>
</div>

<div class="toast" id="toast"></div>
<div id="loading"><div class="spinner"></div><div class="loading-text">正在生成图片…</div></div>
<div id="snapshot"></div>

<!-- Image preview modal -->
<div id="img-modal">
  <div class="modal-hint"><span>👆</span> 长按图片可保存到相册</div>
  <img id="modal-img" src="" alt="Ho位整理表" />
  <div class="modal-actions">
    <button class="btn-modal btn-modal-share" id="btn-share" style="display:none" onclick="shareImage()">🔗 分享</button>
    <button class="btn-modal btn-modal-share" id="btn-download" style="display:none" onclick="downloadImage()">⬇ 下载图片</button>
    <button class="btn-modal btn-modal-close" onclick="closeModal()">✕ 关闭</button>
  </div>
</div>

<script>
const STATUSES = ['卫星中', '进行中', '暂停中', '已结团', '已散桌'];
const STATUS_CLASS = ['status-0', 'status-1', 'status-2', 'status-3', 'status-4'];

const COL_PALETTE = [
  { dot: '#d4a5b0', bg: '#fdf0f3', border: '#f0d0d8', title: '#a0546a' },
  { dot: '#a5b8d4', bg: '#f0f4fd', border: '#d0daf0', title: '#4a6a9a' },
  { dot: '#a5c4a5', bg: '#f0faf0', border: '#d0ead0', title: '#4a844a' },
  { dot: '#c4b4a5', bg: '#faf4f0', border: '#e8ddd4', title: '#7a6050' },
  { dot: '#b0aec8', bg: '#f4f3fa', border: '#dddaf0', title: '#5a5878' },
  { dot: '#e8b87a', bg: '#fdf7ee', border: '#f0dfc0', title: '#8a5a20' },
  { dot: '#c4a0d4', bg: '#f8f0fd', border: '#e8d0f0', title: '#7a4a90' },
  { dot: '#80c4c4', bg: '#eef8f8', border: '#c8e8e8', title: '#307878' },
  { dot: '#d4bd70', bg: '#fdfaee', border: '#ece0b0', title: '#706020' },
  { dot: '#d48080', bg: '#fdf0f0', border: '#f0d0d0', title: '#904040' },
];

let columns = [
  { name: 'Ho1',  colorIdx: 0, entries: [] },
  { name: 'Ho2',  colorIdx: 1, entries: [] },
  { name: 'Ho3',  colorIdx: 2, entries: [] },
  { name: 'Ho4',  colorIdx: 3, entries: [] },
  { name: '无Ho', colorIdx: 4, entries: [] },
];
let nextColorIdx = 5;

function makeEntry() { return { module: '', character: '', status: 0 }; }
function getStyle(ci) { return COL_PALETTE[columns[ci].colorIdx % COL_PALETTE.length]; }

function saveState() {
  try { localStorage.setItem('ho_table_v3', JSON.stringify({ columns, nextColorIdx })); } catch(e) {}
}

function loadState() {
  try {
    let s = localStorage.getItem('ho_table_v3');
    if (s) { const d = JSON.parse(s); columns = d.columns; nextColorIdx = d.nextColorIdx || 5; return; }
    s = localStorage.getItem('ho_table_v2');
    if (s) {
      const d = JSON.parse(s);
      columns = (d.columns || []).map((c, i) => ({ name: c.name||'', colorIdx: i, entries: c.entries||[] }));
      nextColorIdx = columns.length; return;
    }
    s = localStorage.getItem('ho_table');
    if (s) {
      const old = JSON.parse(s);
      columns = columns.map((c, i) => ({ ...c, entries: old[i] || [] }));
    }
  } catch(e) {}
}

let dragSrcIdx = null;

function render() {
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  columns.forEach((col, ci) => {
    const s = getStyle(ci);
    const card = document.createElement('div');
    card.className = 'col-card';
    card.style.borderColor = s.border;
    card.draggable = true;

    card.innerHTML = `
      <div class="col-header" style="background:${s.bg}" title="拖动以排序">
        <span class="col-title" style="color:${s.title}; flex:1; min-width:0;">
          <span class="col-dot" style="background:${s.dot}; flex-shrink:0;"></span>
          <input class="col-title-input" type="text" placeholder="栏目标题…"
            value="${escHtml(col.name)}"
            oninput="renameColumn(${ci}, this.value)"
            onclick="event.stopPropagation()"
            ondragstart="event.stopPropagation()" />
        </span>
        <button class="btn-del-col" title="删除此栏目" onclick="deleteColumn(${ci}); event.stopPropagation()">✕</button>
      </div>
      <div class="entries-list" id="list-${ci}"></div>
      <button class="btn-add" onclick="addEntry(${ci})">＋ 添加条目</button>
    `;

    card.addEventListener('dragstart', e => {
      dragSrcIdx = ci;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.col-card').forEach(c => c.classList.remove('drag-over'));
      dragSrcIdx = null;
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrcIdx !== null && dragSrcIdx !== ci) {
        document.querySelectorAll('.col-card').forEach(c => c.classList.remove('drag-over'));
        card.classList.add('drag-over');
      }
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (dragSrcIdx === null || dragSrcIdx === ci) return;
      const moved = columns.splice(dragSrcIdx, 1)[0];
      columns.splice(ci, 0, moved);
      dragSrcIdx = null;
      saveState(); render();
    });

    grid.appendChild(card);

    const list = document.getElementById(`list-${ci}`);
    col.entries.forEach((entry, ei) => {
      const div = document.createElement('div');
      div.className = 'entry';
      const isFirst = ei === 0, isLast = ei === col.entries.length - 1;
      div.innerHTML = `
        <div class="entry-main">
          <div class="entry-top">
            <span class="status-badge ${STATUS_CLASS[entry.status]}" onclick="cycleStatus(${ci},${ei})">${STATUSES[entry.status]}</span>
            <div class="field-module">
              <input class="text-input" type="text" placeholder="模组名…"
                value="${escHtml(entry.module)}"
                oninput="updateField(${ci},${ei},'module',this.value)" />
            </div>
          </div>
          <div class="field-char">
            <span class="char-label">角色</span>
            <input class="char-input" type="text" placeholder="角色名…"
              value="${escHtml(entry.character)}"
              oninput="updateField(${ci},${ei},'character',this.value)" />
          </div>
        </div>
        <div class="entry-controls">
          <button class="btn-ctrl btn-ctrl-move" title="上移" onclick="moveEntry(${ci},${ei},-1)" ${isFirst?'disabled':''}>↑</button>
          <button class="btn-ctrl btn-ctrl-del" title="删除" onclick="deleteEntry(${ci},${ei})">✕</button>
          <button class="btn-ctrl btn-ctrl-move" title="下移" onclick="moveEntry(${ci},${ei},1)" ${isLast?'disabled':''}>↓</button>
        </div>
      `;
      list.appendChild(div);
    });
    if (col.entries.length === 0) {
      list.innerHTML = `<div style="text-align:center;padding:14px 0;font-size:12px;color:var(--text-muted)">暂无条目</div>`;
    }
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addEntry(ci) {
  columns[ci].entries.push(makeEntry());
  saveState(); render();
  setTimeout(() => {
    const inputs = document.getElementById(`list-${ci}`).querySelectorAll('input.text-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 30);
}
function deleteEntry(ci, ei) { columns[ci].entries.splice(ei,1); saveState(); render(); }
function moveEntry(ci, ei, dir) {
  const e = columns[ci].entries, t = ei+dir;
  if (t<0||t>=e.length) return;
  [e[ei],e[t]]=[e[t],e[ei]]; saveState(); render();
}
function cycleStatus(ci, ei) {
  columns[ci].entries[ei].status=(columns[ci].entries[ei].status+1)%STATUSES.length;
  saveState(); render();
}
function updateField(ci, ei, field, val) { columns[ci].entries[ei][field]=val; saveState(); }
function renameColumn(ci, val) { columns[ci].name=val; saveState(); }
function deleteColumn(ci) {
  if (columns[ci].entries.length>0 && !confirm('此栏目还有条目，确认删除？')) return;
  columns.splice(ci,1); saveState(); render();
}
function addCustomColumn() {
  columns.push({ name:'', colorIdx: nextColorIdx++, entries:[] });
  saveState(); render();
  setTimeout(() => {
    const cards = document.querySelectorAll('.col-card');
    const input = cards[cards.length-1]?.querySelector('.col-title-input');
    if (input) input.focus();
  }, 30);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

let exportMode = 'wide'; // 'wide' | 'long'

function setMode(mode) {
  exportMode = mode;
  document.getElementById('modeWide').classList.toggle('active', mode === 'wide');
  document.getElementById('modeLong').classList.toggle('active', mode === 'long');
}

function buildSnapshot() {
  const snap = document.getElementById('snapshot');
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  if (exportMode === 'long') {
    // ── Long image: 750px wide, 2-col grid ──
    snap.style.width = '750px';
    snap.style.padding = '36px 28px 40px';
    const n = columns.length;
    let gridHtml = `<div class="snap-grid">`;
    columns.forEach((col, ci) => {
      const s = getStyle(ci);
      const colName = col.name || '（未命名）';
      let entriesHtml = col.entries.length === 0
        ? '<div class="snap-empty">暂无条目</div>'
        : col.entries.map(e => `
            <div class="snap-entry">
              <div class="snap-mod-row">
                <span class="status-badge ${STATUS_CLASS[e.status]}" style="font-size:9px;padding:1px 6px;">${STATUSES[e.status]}</span>
                <span class="snap-mod-name">${escHtml(e.module||'（未命名模组）')}</span>
              </div>
              ${e.character?`<div class="snap-char">角色：${escHtml(e.character)}</div>`:''}</div>`).join('');
      gridHtml += `
        <div class="snap-col" style="border-color:${s.border}">
          <div class="snap-col-h" style="background:${s.bg};color:${s.title}">
            <span class="snap-dot" style="background:${s.dot}"></span>${escHtml(colName)}
          </div>
          <div class="snap-col-body">${entriesHtml}</div>
        </div>`;
    });
    gridHtml += '</div>';
    snap.innerHTML = `
      <div class="snap-title">Ho 位整理表</div>
      <div class="snap-sub">${dateStr}</div>
      ${gridHtml}
      <div class="snap-footer">generated with 素米Summeee的Ho位整理表</div>
    `;
  } else {
    // ── Wide image: 1028px wide, all cols in one row ──
    snap.style.width = '1028px';
    snap.style.padding = '24px 16px 32px';
    const n = columns.length;
    let gridHtml = `<div class="snap-grid" style="grid-template-columns:repeat(${n},1fr)">`;
    columns.forEach((col, ci) => {
      const s = getStyle(ci);
      const colName = col.name || '（未命名）';
      let entriesHtml = col.entries.length === 0
        ? '<div class="snap-empty">暂无条目</div>'
        : col.entries.map(e => `
            <div class="snap-entry">
              <div class="snap-mod-row">
                <span class="status-badge ${STATUS_CLASS[e.status]}" style="font-size:9px;padding:1px 6px;">${STATUSES[e.status]}</span>
                <span class="snap-mod-name">${escHtml(e.module||'（未命名模组）')}</span>
              </div>
              ${e.character?`<div class="snap-char">角色：${escHtml(e.character)}</div>`:''}</div>`).join('');
      gridHtml += `
        <div class="snap-col" style="border-color:${s.border}">
          <div class="snap-col-h" style="background:${s.bg};color:${s.title}">
            <span class="snap-dot" style="background:${s.dot}"></span>${escHtml(colName)}
          </div>
          <div class="snap-col-body">${entriesHtml}</div>
        </div>`;
    });
    gridHtml += '</div>';
    snap.innerHTML = `
      <div class="snap-title">Ho 位整理表</div>
      <div class="snap-sub">${dateStr}</div>
      ${gridHtml}
      <div class="snap-footer">generated with 素米Summeee的Ho位整理表</div>
    `;
  }
}

let _currentDataUrl = null;

function exportImage() {
  buildSnapshot();
  const loading = document.getElementById('loading');
  loading.classList.add('show');
  const isLong = exportMode === 'long';
  setTimeout(() => {
    html2canvas(document.getElementById('snapshot'), {
      scale: isLong ? 2 : 2,
      useCORS: true,
      backgroundColor: '#f5f0eb',
      logging: false,
      width: isLong ? 750 : 1028,
    }).then(canvas => {
      loading.classList.remove('show');
      const dataUrl = canvas.toDataURL('image/png');
      _currentDataUrl = dataUrl;
      document.getElementById('modal-img').src = dataUrl;
      const shareBtn = document.getElementById('btn-share');
      const dlBtn = document.getElementById('btn-download');
      if (navigator.canShare && navigator.share) {
        shareBtn.style.display = 'inline-flex'; dlBtn.style.display = 'none';
      } else {
        shareBtn.style.display = 'none'; dlBtn.style.display = 'inline-flex';
      }
      document.getElementById('img-modal').classList.add('show');
    }).catch(err => {
      loading.classList.remove('show');
      showToast('⚠ 导出失败，请重试');
      console.error(err);
    });
  }, 100);
}

function closeModal() {
  document.getElementById('img-modal').classList.remove('show');
  document.getElementById('modal-img').src = '';
  _currentDataUrl = null;
}
async function shareImage() {
  if (!_currentDataUrl) return;
  try {
    const res = await fetch(_currentDataUrl);
    const blob = await res.blob();
    const file = new File([blob], 'Ho位整理表.png', { type:'image/png' });
    await navigator.share({ files:[file], title:'Ho位整理表' });
  } catch(e) { if (e.name!=='AbortError') showToast('⚠ 分享失败'); }
}
function downloadImage() {
  if (!_currentDataUrl) return;
  const a = document.createElement('a');
  a.href = _currentDataUrl; a.download = 'Ho位整理表.png'; a.click();
}

document.getElementById('img-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadState();
render();
</script>
</body>
</html>
